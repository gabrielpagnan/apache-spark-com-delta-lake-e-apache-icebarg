site_name: Apache Spark com Delta Lake e Iceberg
site_description: Documentação do trabalho de Arquitetura de Dados - SATC
site_url: https://bielmpmat99.github.io/spark-lakehouse
repo_url: https://github.com/bielmpmat99/spark-lakehouse
repo_name: bielmpmat99/spark-lakehouse
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: pt
  - mermaid2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Início: index.md
  - Apache Spark: spark.md
  - Delta Lake: delta.md
  - Apache Iceberg: iceberg.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bielmpmat99/spark-lakehouse

copyright: Copyright &copy; 2025 - Grupo Spark Lakehouse | SATC
